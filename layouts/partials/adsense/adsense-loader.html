<script>
  (function() {
    'use strict';

    if (typeof window === 'undefined') return;

    var adsByGoogle = document.querySelectorAll('.adsbygoogle');

    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var ad = entry.target;
            if (ad.getAttribute('data-loaded') !== 'true') {
              ad.setAttribute('data-loaded', 'true');
              (adsbygoogle = window.adsbygoogle || []).push({});
            }
            observer.unobserve(ad);
          }
        });
      }, { rootMargin: '200px 0px' });

      adsByGoogle.forEach(function(ad) {
        observer.observe(ad);
      });
    } else {
      // Fallback: push all immediately if IntersectionObserver not supported
      for (var i = 0; i < adsByGoogle.length; i++) {
        (adsbygoogle = window.adsbygoogle || []).push({});
      }
    }
  })();
</script>
