{{ $slot   := .Get "slot" | default "" }}
{{ $format  := .Get "format" | default "auto" }}

<div class="lazy-ad" data-slot="{{ $slot }}" data-format="{{ $format }}">
  <ins class="adsbygoogle"
       style="display:block;"
       data-ad-client="ca-pub-6677996696534146"
       data-ad-slot="{{ $slot }}"
       data-ad-format="{{ $format }}">
  </ins>
</div>

<script>
  (function() {
    var el = document.currentScript && document.currentScript.parentElement;
    if (!el) return;
    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            var ad = el.querySelector('.adsbygoogle');
            if (ad && ad.getAttribute('data-loaded') !== 'true') {
              ad.setAttribute('data-loaded', 'true');
              (adsbygoogle = window.adsbygoogle || []).push({});
            }
            observer.unobserve(el);
          }
        });
      }, { rootMargin: '200px 0px' });
      observer.observe(el);
    } else {
      var adFallback = el.querySelector('.adsbygoogle');
      if (adFallback) {
        (adsbygoogle = window.adsbygoogle || []).push({});
      }
    }
  })();
</script>
